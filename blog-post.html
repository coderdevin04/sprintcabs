<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title id="pageTitle">Blog | Sprint Cabs</title>
  <link rel="icon" type="image/x-icon" href="photos/favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="photos/favicon.ico" />
  <link rel="apple-touch-icon" href="photos/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    :root { --teal:#006a61;--dark:#001815;--dark-2:#002f2a;--surface:#f9f9ff;--surface-low:#f0f3ff;--surface-mid:#e7eeff;--surface-high:#dee8ff;--text:#111c2d;--text-muted:#45474c;--text-secondary:#515f74;--gold:#fadfb8;--border:#c5c6cd;--emerald:#10b981; }
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text); }
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle; }
    
    nav { position:sticky;top:0;width:100%;z-index:100;background:rgba(249,249,255,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(197,198,205,0.3);box-shadow:0 1px 20px rgba(0,0,0,0.04); }
    .nav-inner { display:flex;justify-content:space-between;align-items:center;height:76px;padding:0 2.5rem;max-width:1400px;margin:0 auto; }
    .logo { font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--dark);letter-spacing:-0.03em;text-decoration:none; }
    .nav-links { display:flex;gap:2.5rem;align-items:center; }
    .nav-links a { font-size:0.875rem;font-weight:500;color:var(--text-secondary);text-decoration:none;transition:color 0.2s; }
    .nav-links a.active { color:var(--teal);font-weight:700;border-bottom:2px solid var(--teal);padding-bottom:2px; }
    .nav-ctas { display:flex;gap:1rem;align-items:center; }
    .btn-wa { background:var(--emerald);color:white;border:none;padding:0.6rem 1.4rem;border-radius:100px;font-family:inherit;font-size:0.875rem;font-weight:700;cursor:pointer;transition:transform 0.2s; }
    .btn-wa:hover { transform:scale(1.05); }
    .hamburger { display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:0;width:24px;height:24px;align-items:center;justify-content:center; }
    .hamburger span { width:24px;height:2px;background:var(--text-secondary);border-radius:2px;transition:all 0.3s ease;display:block; }
    .hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(8px, 8px); }
    .hamburger.active span:nth-child(2) { opacity:0; }
    .hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(7px, -7px); }
    .mobile-menu { display:none;width:100%;background:rgba(249,249,255,0.98);backdrop-filter:blur(20px);flex-direction:column;padding:0 1.5rem;gap:0;border-bottom:1px solid rgba(197,198,205,0.3);box-shadow:0 10px 24px rgba(0,24,21,0.08);max-height:0;overflow:hidden;opacity:0;transition:max-height 0.3s ease,opacity 0.25s ease,padding 0.25s ease; }
    .mobile-menu.active { max-height:320px;opacity:1;padding:0.5rem 1.5rem 1rem; }
    .mobile-menu a { padding:1rem 1.5rem;text-decoration:none;color:var(--text-secondary);font-weight:500;font-size:0.95rem;border-bottom:1px solid rgba(197,198,205,0.2);transition:all 0.2s; }
    .mobile-menu a:last-child { border-bottom:none; }
    .mobile-menu a:hover { background:var(--surface-low);color:var(--text); }
    .mobile-menu a.active { color:var(--teal);font-weight:700;background:rgba(0,106,97,0.08); }
    
    main { padding:2rem 2rem 4rem;max-width:900px;margin:0 auto; }
    
    /* HERO */
    .blog-hero { margin-bottom:3rem; }
    .blog-hero-image { width:100%;aspect-ratio:16/9;border-radius:1.25rem;overflow:hidden;margin-bottom:2rem;background:var(--surface-low); }
    .blog-hero-image img { width:100%;height:100%;object-fit:cover; }
    .blog-hero-meta { display:flex;gap:1.5rem;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap; }
    .blog-category { background:rgba(0,106,97,0.1);color:var(--teal);padding:0.4rem 1rem;border-radius:0.5rem;font-size:0.8rem;font-weight:700;text-transform:uppercase; }
    .blog-date { color:var(--text-muted);font-size:0.9rem; }
    .blog-header h1 { font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:900;color:var(--dark);letter-spacing:-0.03em;margin-bottom:1rem;line-height:1.2; }
    
    /* CONTENT */
    .blog-content { font-size:1.05rem;line-height:1.8;color:var(--text); }
    .blog-content h2 { font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--dark);margin:2rem 0 1rem; }
    .blog-content h3 { font-size:1.35rem;font-weight:700;color:var(--dark);margin:1.75rem 0 1rem; }
    .blog-content p { margin-bottom:1.25rem; }
    .blog-content ul, .blog-content ol { margin-left:2rem;margin-bottom:1.25rem; }
    .blog-content li { margin-bottom:0.75rem; }
    .blog-content strong { color:var(--dark);font-weight:700; }
    
    /* RELATED POSTS */
    .related-section { margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border); }
    .related-section h2 { font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--dark);margin-bottom:1.5rem; }
    .related-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem; }
    .related-card { background:white;border-radius:1rem;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform 0.3s;cursor:pointer;text-decoration:none;color:inherit; }
    .related-card:hover { transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.08); }
    .related-image { aspect-ratio:16/9;overflow:hidden;background:var(--surface-low); }
    .related-image img { width:100%;height:100%;object-fit:cover; }
    .related-body { padding:1.25rem; }
    .related-title { font-weight:700;font-size:1rem;color:var(--dark);margin-bottom:0.5rem;line-height:1.3; }
    .related-date { font-size:0.8rem;color:var(--text-muted); }
    
    /* CTA */
    .blog-cta { background:linear-gradient(135deg,var(--dark-2),var(--teal));color:white;padding:2rem;border-radius:1.25rem;margin-top:3rem;text-align:center; }
    .blog-cta h3 { font-size:1.5rem;margin-bottom:1rem; }
    .blog-cta p { margin-bottom:1.5rem;opacity:0.95; }
    .cta-button { background:var(--emerald);color:white;border:none;padding:0.9rem 2rem;border-radius:0.75rem;font-family:inherit;font-weight:700;cursor:pointer;transition:opacity 0.2s; }
    .cta-button:hover { opacity:0.9; }
    
    /* BACK BUTTON */
    .back-link { display:inline-flex;align-items:center;gap:0.5rem;color:var(--teal);text-decoration:none;font-weight:600;margin-bottom:1rem;transition:gap 0.2s; }
    .back-link:hover { gap:0.75rem; }
    .back-link::before { content:'←'; }
    
    footer { background:#0f1a18;color:rgba(255,255,255,0.5);padding:2.5rem;text-align:center;font-size:0.85rem;margin-top:4rem; }
    
    /* MOBILE */
    @media (max-width:900px) {
      nav { height:auto; }
      .nav-inner { padding:0 1.5rem;height:auto;min-height:64px; }
      .nav-links { display:none; }
      main { padding:1.5rem 1.5rem 3rem; }
      .blog-hero h1 { font-size:clamp(1.75rem,5vw,2.5rem); }
      .blog-content h2 { font-size:1.5rem;margin:1.5rem 0 0.75rem; }
      .related-grid { grid-template-columns:1fr; }
    }
    
    @media (max-width:420px) {
      .nav-inner { padding:0 1rem; }
      .logo { font-size:1.2rem; }
      main { padding:1.25rem 1rem 3rem; }
      .blog-hero-image { margin-bottom:1.5rem; }
      .blog-hero-meta { gap:0.75rem;font-size:0.9rem; }
      .blog-header h1 { font-size:clamp(1.5rem,4vw,2.25rem);margin-bottom:0.75rem; }
      .blog-content { font-size:1rem;line-height:1.6; }
      .blog-content h2 { font-size:1.35rem;margin:1.25rem 0 0.75rem; }
      .blog-content h3 { font-size:1.1rem;margin:1rem 0 0.5rem; }
      .blog-content p { margin-bottom:1rem; }
      .blog-content ul { margin-left:1.5rem; }
      .related-section { margin-top:2rem;padding-top:2rem; }
      .related-section h2 { font-size:1.35rem;margin-bottom:1rem; }
      .blog-cta { padding:1.5rem;margin-top:2rem; }
      .blog-cta h3 { font-size:1.25rem;margin-bottom:0.75rem; }
      .back-link { font-size:0.9rem;margin-bottom:0.75rem; }
      footer { padding:1.5rem 1rem; }
    }

    @media (max-width:600px) {
      .hamburger { display:flex; }
      .nav-ctas { display:none; }
      .mobile-menu { display:flex; }
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Sprint Cabs</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cabs.html">Book Cab</a>
      <a href="blogs.html" class="active">Blog</a>
      <a href="about.html">About</a>
    </div>
    <div class="nav-ctas">
      <button class="btn-wa">WhatsApp</button>
    </div>
    <button class="hamburger" id="hamburgerBtn">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="cabs.html">Book Cab</a>
    <a href="blogs.html" class="active">Blog</a>
    <a href="about.html">About</a>
  </div>
</nav>

<main>
  <a href="blogs.html" class="back-link">Back to Blogs</a>
  
  <article class="blog-hero">
    <div class="blog-hero-image" id="blogImage">
      <!-- Image will be loaded here -->
    </div>
    
    <div class="blog-hero-meta">
      <span class="blog-category" id="blogCategory"></span>
      <span class="blog-date" id="blogDate"></span>
    </div>
    
    <div class="blog-header">
      <h1 id="blogTitle"></h1>
    </div>
  </article>

  <!-- CONTENT -->
  <div class="blog-content" id="blogContent">
    <!-- Content will be loaded here -->
  </div>

  <!-- RELATED POSTS -->
  <section class="related-section" id="relatedSection" style="display:none;">
    <h2>Related Posts</h2>
    <div class="related-grid" id="relatedGrid">
      <!-- Related posts will be loaded here -->
    </div>
  </section>

  <!-- CTA -->
  <div class="blog-cta">
    <h3>Ready for Your Journey?</h3>
    <p>Book a cab with Sprint Cabs for a comfortable and safe travel experience</p>
    <button class="cta-button" onclick="redirectToBooking()">Book a Cab Now</button>
  </div>
</main>

<footer><p>© 2026 Sprint Cabs · <a href="index.html">Home</a></p></footer>

<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/blogs.js"></script>
<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburgerBtn.addEventListener('click', function () {
    hamburgerBtn.classList.toggle('active');
    mobileMenu.classList.toggle('active');
  });

  mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', function () {
      hamburgerBtn.classList.remove('active');
      mobileMenu.classList.remove('active');
    });
  });

  document.addEventListener('click', function (event) {
    if (!event.target.closest('nav') && !event.target.closest('#mobileMenu') && mobileMenu.classList.contains('active')) {
      hamburgerBtn.classList.remove('active');
      mobileMenu.classList.remove('active');
    }
  });

  function redirectToBooking() {
    window.location.href = 'cabs.html';
  }
</script>
</body>
</html>
