<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Our Cabs | Sprint Cabs</title>
  <link rel="icon" type="image/x-icon" href="photos/favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="photos/favicon.ico" />
  <link rel="apple-touch-icon" href="photos/favicon.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --teal: #006a61;
      --dark: #001815;
      --dark-2: #002f2a;
      --surface: #f9f9ff;
      --surface-low: #f0f3ff;
      --surface-mid: #e7eeff;
      --surface-high: #dee8ff;
      --text: #111c2d;
      --text-muted: #45474c;
      --text-secondary: #515f74;
      --gold: #fadfb8;
      --border: #c5c6cd;
      --emerald: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    nav {
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 100;
      background: rgba(249, 249, 255, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(197, 198, 205, 0.3);
      box-shadow: 0 1px 20px rgba(0, 0, 0, 0.04);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 76px;
      padding: 0 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--dark);
      letter-spacing: -0.03em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a.active {
      color: var(--teal);
      font-weight: 700;
      border-bottom: 2px solid var(--teal);
      padding-bottom: 2px;
    }

    .nav-ctas {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn-ghost {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .btn-wa {
      background: var(--emerald);
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 100px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-wa:hover {
      transform: scale(1.05);
    }

    /* HAMBURGER MENU */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      align-items: center;
      justify-content: center;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--text-secondary);
      border-radius: 2px;
      transition: all 0.3s ease;
      display: block;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }

    .mobile-menu {
      display: none;
      width: 100%;
      background: rgba(249, 249, 255, 0.98);
      backdrop-filter: blur(20px);
      flex-direction: column;
      padding: 0 1.5rem;
      gap: 0;
      border-bottom: 1px solid rgba(197, 198, 205, 0.3);
      box-shadow: 0 10px 24px rgba(0, 24, 21, 0.08);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.25s ease;
    }

    .mobile-menu.active {
      max-height: 320px;
      opacity: 1;
      padding: 0.5rem 1.5rem 1rem;
    }

    .mobile-menu a {
      padding: 1rem 1.5rem;
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(197, 198, 205, 0.2);
      transition: all 0.2s;
    }

    .mobile-menu a:last-child {
      border-bottom: none;
    }

    .mobile-menu a:hover {
      background: var(--surface-low);
      color: var(--text);
    }

    .mobile-menu a.active {
      color: var(--teal);
      font-weight: 700;
      background: rgba(0, 106, 97, 0.08);
    }

    main {
      padding: 2rem 2rem 6rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 3rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 900;
      color: var(--dark);
      letter-spacing: -0.04em;
      margin-bottom: 0.75rem;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 540px;
      line-height: 1.6;
    }

    .layout {
      display: flex;
      gap: 3rem;
      align-items: flex-start;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      position: sticky;
      top: 96px;
    }

    .filter-group {
      margin-bottom: 2rem;
    }

    .filter-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: block;
    }

    .range-input {
      width: 100%;
      accent-color: var(--teal);
      height: 4px;
    }

    .range-vals {
      display: flex;
      justify-content: space-between;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }

    .check-item input {
      accent-color: var(--teal);
      width: 1rem;
      height: 1rem;
    }

    .check-item span {
      font-size: 0.875rem;
      color: var(--text);
    }

    .cap-btns {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .cap-btn {
      padding: 0.4rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cap-btn.active {
      background: var(--dark-2);
      color: white;
      border-color: var(--dark-2);
    }

    .type-filters {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 0.6rem 1.25rem;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-secondary);
      text-align: center;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    .filter-btn.active {
      background: var(--teal);
      color: white;
      border-color: var(--teal);
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .v-card {
      background: white;
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .v-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 50px rgba(0, 24, 21, 0.1);
    }

    .v-img {
      position: relative;
      aspect-ratio: 16/10;
      overflow: hidden;
    }

    .v-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s;
    }

    .v-card:hover .v-img img {
      transform: scale(1.06);
    }

    .v-tag {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border-radius: 0.35rem;
    }

    .tag-gold {
      background: rgba(250, 223, 184, 0.9);
      color: #7a5c1e;
    }

    .tag-teal {
      background: var(--teal);
      color: white;
    }

    .v-body {
      padding: 1.5rem;
    }

    .v-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .v-name {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--dark);
    }

    .v-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .v-specs-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .variant-buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .variant-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.625rem;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .variant-btn.active {
      background: var(--teal);
      color: white;
      border-color: var(--teal);
    }

    .variant-btn:hover {
      background: var(--surface-mid);
      border-color: var(--teal);
    }

    .v-spec-box {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 0.625rem;
      background: var(--surface-low);
    }

    .v-spec-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      justify-content: center;
    }

    .v-spec-item.seats {
      border-right: 1px solid var(--border);
      padding-right: 2rem;
    }

    .v-spec-item.price {
      padding-left: 2rem;
    }

    .v-spec-box .material-symbols-outlined {
      font-size: 2.5rem;
      color: var(--teal);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .v-spec-content {
      display: flex;
      flex-direction: column-reverse;
      gap: 0.15rem;
    }

    .v-spec-box span.lbl {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0;
    }

    .v-spec-value {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--teal);
    }

    .v-price-unit {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .v-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn-select {
      flex: 1;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--dark-2), var(--teal));
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-select:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .btn-info {
      width: 3.25rem;
      height: 3.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-info:hover {
      background: var(--surface-low);
    }

    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 200;
      background: var(--emerald);
      color: white;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .fab:hover {
      transform: scale(1.1) translateY(-4px);
    }

    footer {
      background: #0f1a18;
      color: rgba(255, 255, 255, 0.5);
      padding: 2.5rem;
      text-align: center;
      font-size: 0.85rem;
    }

    footer a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 1.25rem;
      padding: 2rem;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--dark);
      margin: 0;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      min-height: 48px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0, 106, 97, 0.1);
    }

    .vehicle-info {
      background: var(--surface-low);
      padding: 1rem;
      border-radius: 0.75rem;
      margin-bottom: 1.25rem;
      border-left: 4px solid var(--teal);
    }

    .vehicle-info p {
      font-size: 0.875rem;
      color: var(--text);
      margin: 0.25rem 0;
    }

    .vehicle-info strong {
      color: var(--dark);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn-cancel {
      flex: 1;
      padding: 0.9rem;
      background: var(--surface-low);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      background: var(--surface-mid);
    }

    .btn-submit {
      flex: 1;
      padding: 0.9rem;
      background: var(--emerald);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    @media (max-width:900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        position: static;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .mobile-menu {
        display: flex;
      }
    }

    @media (max-width: 420px) {

      /* NAV */
      nav {
        padding: 0;
      }

      .nav-inner {
        height: 64px;
        padding: 0 1rem;
      }

      .logo {
        font-size: 1.2rem;
      }

      .nav-links {
        display: none;
      }

      .btn-ghost {
        display: none;
      }

      .btn-wa {
        padding: 0.5rem 1rem;
        font-size: 0.75rem;
      }

      /* MAIN */
      main {
        padding: 1.5rem 1rem 4rem;
      }

      .page-header {
        margin-bottom: 1.5rem;
      }

      .page-header h1 {
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        margin-bottom: 0.5rem;
      }

      .page-header p {
        font-size: 0.9rem;
        max-width: 100%;
      }

      /* LAYOUT */
      .layout {
        flex-direction: column;
        gap: 1.5rem;
        align-items: stretch;
      }

      .sidebar {
        width: 100%;
        position: static;
      }

      /* FILTERS */
      .filter-group {
        margin-bottom: 1rem;
      }

      .filter-label {
        font-size: 0.6rem;
        margin-bottom: 0.75rem;
      }

      .range-vals {
        font-size: 0.75rem;
      }

      .check-item {
        gap: 0.6rem;
        margin-bottom: 0.6rem;
      }

      .check-item span {
        font-size: 0.8rem;
      }

      .cap-btns {
        gap: 0.4rem;
      }

      .cap-btn {
        padding: 0.35rem 0.8rem;
        font-size: 0.75rem;
      }

      /* GRID */
      .grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      /* VEHICLE CARDS */
      .v-card {
        border-radius: 1rem;
      }

      .v-img {
        aspect-ratio: 16/9;
      }

      .v-tag {
        top: 0.75rem;
        left: 0.75rem;
        font-size: 0.6rem;
        padding: 0.3rem 0.6rem;
      }

      .v-body {
        padding: 1rem;
      }

      .v-header {
        margin-bottom: 1rem;
      }

      .v-name {
        font-size: 1rem;
      }

      .v-sub {
        font-size: 0.75rem;
        margin-top: 0.2rem;
      }

      /* VARIANT BUTTONS */
      .variant-buttons {
        margin-bottom: 1rem;
        gap: 0.4rem;
      }

      .variant-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.75rem;
        border-radius: 0.5rem;
      }

      /* SPEC BOX */
      .v-spec-box {
        
        gap: 1rem;
        align-items: stretch;
        justify-content: center;
        padding: 0.9rem 1rem;
        border-radius: 0.5rem;
        flex-direction: row;
      }

      .v-spec-item {
        gap: 0.5rem;
      }

      .v-spec-item.seats {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-right: 0;
        padding-bottom:
          1rem;
      }

      .v-spec-item.price {
        padding-left: 0;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }

      .v-spec-box .material-symbols-outlined {
        font-size: 2rem;
      }

      .v-spec-content {
        gap: 0.1rem;
      }

      .v-spec-box span.lbl {
        font-size: 0.65rem;
      }

      .v-spec-value {
        font-size: 1.1rem;
      }

      /* ACTIONS */
      .v-actions {
        gap: 0.5rem;
      }

      .btn-select {
        padding: 0.75rem;
        font-size: 0.8rem;
      }

      .btn-info {
        width: 2.75rem;
        height: 2.75rem;
      }

      /* MODAL */
      .modal-content {
        width: 95%;
        max-width: 100%;
        padding: 1.5rem;
        border-radius: 1rem;
      }

      .modal-header h2 {
        font-size: 1.25rem;
      }

      .form-label {
        font-size: 0.8rem;
      }

      .form-input {
        padding: 0.6rem;
        font-size: 14px;
        min-height: 44px;
      }

      .vehicle-info {
        padding: 0.75rem;
        margin-bottom: 1rem;
        border-left-width: 3px;
      }

      .vehicle-info p {
        font-size: 0.8rem;
        margin: 0.2rem 0;
      }

      .modal-actions {
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .btn-cancel,
      .btn-submit {
        padding: 0.75rem;
        font-size: 0.8rem;
      }

      /* FOOTER */
      footer {
        padding: 1.5rem 1rem 1rem;
        font-size: 0.8rem;
      }

      /* FAB */
      .fab {
        bottom: 1rem;
        right: 1rem;
        width: 3rem;
        height: 3rem;
      }
    }

    @media (max-width: 360px) {
      main {
        padding: 5.5rem 0.75rem 4rem;
      }

      .page-header h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
      }

      .v-img {
        aspect-ratio: 16/10;
      }

      .v-name {
        font-size: 0.9rem;
      }

      .v-spec-value {
        font-size: 1rem;
      }

      .v-spec-box {
        padding: 0.8rem;
      }

      .modal-content {
        width: 98%;
        padding: 1rem;
      }

      .fab {
        width: 2.75rem;
        height: 2.75rem;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">Sprint Cabs</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cabs.html" class="active">Book Cab</a>
        <a href="blogs.html">Blog</a>
        <a href="about.html">About</a>
      </div>
      <button class="hamburger" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Home</a>
      <a href="cabs.html" class="active">Book Cab</a>
      <a href="blogs.html">Blog</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>Our Cabs Services</h1>
      <p>Select from our curated collection of premium vehicles, maintained to the highest standards for your safety and
        comfort.</p>
    </div>
    <div class="layout">
      <!-- FILTERS SIDEBAR -->
      <div class="sidebar">
        <div class="filter-group">
          <label class="filter-label">Vehicle Type</label>
          <div class="type-filters">
            <button class="filter-btn active" data-type="all">All</button>
            <button class="filter-btn" data-type="Sedan">Sedan</button>
            <button class="filter-btn" data-type="SUV">SUV</button>
            <button class="filter-btn" data-type="MPV">MPV</button>
            <button class="filter-btn" data-type="Coach">Coach</button>
          </div>
        </div>
      </div>

      <!-- VEHICLE GRID -->
      <div class="grid" id="vehicleGrid">
        <!-- Vehicles will be loaded here from JSON -->
      </div>
    </div>
  </main>

  <div class="fab">
    <img src="photos/whatsapp.svg" alt="WhatsApp" width="24" height="24" />
  </div>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Book Your Cab</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>

      <div class="vehicle-info" id="vehicleInfo">
        <!-- Vehicle details will be populated here -->
      </div>

      <div id="bookingForm">
        <div class="form-group">
          <label class="form-label">Pickup Location *</label>
          <input type="text" class="form-input" id="pickupLocation" placeholder="e.g., Jaipur Railway Station" />
        </div>

        <div class="form-group">
          <label class="form-label">Drop Location *</label>
          <input type="text" class="form-input" id="dropLocation" placeholder="e.g., Udaipur City Palace" />
        </div>

        <div class="form-group">
          <label class="form-label">Travel Date *</label>
          <input type="date" class="form-input" id="travelDate" />
        </div>

        <div class="form-group">
          <label class="form-label">Number of Passengers *</label>
          <input type="number" class="form-input" id="passengers" min="1" placeholder="e.g., 4" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="button" class="btn-submit" onclick="handleBooking()">Send via WhatsApp</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2016 Sprint Cabs · <a href="index.html">Home</a></p>
  </footer>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script>
    // Hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburgerBtn.addEventListener('click', function () {
      hamburgerBtn.classList.toggle('active');
      mobileMenu.classList.toggle('active');
    });

    // Close menu when a link is clicked
    const mobileMenuLinks = mobileMenu.querySelectorAll('a');
    mobileMenuLinks.forEach(link => {
      link.addEventListener('click', function () {
        hamburgerBtn.classList.remove('active');
        mobileMenu.classList.remove('active');
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', function (event) {
      if (!event.target.closest('nav') && !event.target.closest('#mobileMenu') && mobileMenu.classList.contains('active')) {
        hamburgerBtn.classList.remove('active');
        mobileMenu.classList.remove('active');
      }
    });
    // Modal management
    let selectedVehicleData = {};

    function openBookingModal(event, vehicleName, price, seats, hasVariants = false) {
      event.preventDefault();
      selectedVehicleData = { vehicleName, price, seats, hasVariants };

      // Display vehicle info in modal
      const variantInfo = hasVariants ? `<p><strong>Variant:</strong> ${seats} Seater</p>` : '';
      document.getElementById('vehicleInfo').innerHTML = `
    <p><strong>Car:</strong> ${vehicleName} </p>
      ${variantInfo}
    <p><strong>Price:</strong> ₹${price}/Km</p>
    <p><strong>Seats:</strong> ${seats}</p>
  `;

      // Show modal
      document.getElementById('bookingModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('bookingModal').classList.remove('active');
      document.getElementById('pickupLocation').value = '';
      document.getElementById('dropLocation').value = '';
      document.getElementById('travelDate').value = '';
      document.getElementById('passengers').value = '';
    }

    function handleBooking() {
      const pickup = document.getElementById('pickupLocation').value.trim();
      const drop = document.getElementById('dropLocation').value.trim();
      const date = document.getElementById('travelDate').value;
      const passengers = document.getElementById('passengers').value;

      // Manual validation
      if (!pickup || !drop || !date || !passengers) {
        alert('Please fill in all fields before sending.');
        return;
      }

      // Format date for display
      const dateObj = new Date(date);
      const formattedDate = dateObj.toISOString().split('T')[0];

      // Create WhatsApp message with variant info if applicable
      let variantLine = '';
      if (selectedVehicleData.hasVariants) {
        variantLine = `\nVariant: *${selectedVehicleData.seats} Seater*`;
      }

      const message = `Hi SprintCabs! I want to book a cab.\n\nCar: *${selectedVehicleData.vehicleName}*${variantLine}\nPickup: ${pickup}\nDrop: ${drop}\nDate: ${formattedDate}\nPassengers: ${passengers} passengers\n\nPlease share the fare and confirm availability.`;

      // Encode message for URL
      const encodedMessage = encodeURIComponent(message);

      // Get WhatsApp number from config (single source of truth)
      const whatsappNumber = (typeof CONFIG !== 'undefined' && CONFIG.whatsapp.phoneNumber) ? CONFIG.whatsapp.phoneNumber : '918502879691';

      // Open WhatsApp
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;
      window.open(whatsappURL, '_blank');

      // Close modal
      closeModal();
    }

    // Close modal when clicking outside
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('bookingModal').addEventListener('click', function (event) {
        if (event.target === this) {
          closeModal();
        }
      });
    });

    // Load and render vehicles from JSON
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        const response = await fetch('data/vehicles.json');
        const data = await response.json();
        let vehiclesData = data.vehicles;
        let currentFilter = 'all';

        const vehicleGrid = document.getElementById('vehicleGrid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Function to render vehicles based on filter
        function renderVehicles(filter) {
          const filtered = filter === 'all' 
            ? vehiclesData 
            : vehiclesData.filter(v => v.type === filter);

          vehicleGrid.innerHTML = filtered.map(vehicle => {
            // Check if vehicle has variants
            const variants = vehicle.variants || [{ seats: vehicle.seats, price: vehicle.price }];

            return `
      <div class="v-card">
        <div class="v-img">
          <img src="${vehicle.photo}" alt="${vehicle.name}"/>
          ${vehicle.tag ? `<span class="v-tag tag-${vehicle.tagType}">${vehicle.tag}</span>` : ''}
        </div>
        <div class="v-body">
          <div class="v-header">
            <div>
              <p class="v-name">${vehicle.name}</p>
              <p class="v-sub">${vehicle.subtitle}</p>
            </div>
          </div>
          
          ${variants.length > 1 ? `
            <div class="variant-buttons" data-vehicle-id="${vehicle.id}">
              ${variants.map((variant, index) => `
                <button class="variant-btn ${index === 0 ? 'active' : ''}" data-seats="${variant.seats}" data-price="${variant.price}" onclick="selectVariant(this, '${vehicle.name}', '${variant.seats}', '${variant.price}')">
                  ${variant.seats} Seater
                </button>
              `).join('')}
            </div>
          ` : ''}
          
          <div class="v-specs-grid">
            <div class="v-spec-box">
              <div class="v-spec-item seats">
                <span class="material-symbols-outlined">${vehicle.seatIcon}</span>
                <div class="v-spec-content">
                  <span class="lbl">Seats</span>
                  <span class="v-spec-value" data-seats-display>${variants[0].seats}</span>
                </div>
              </div>
              <div class="v-spec-item price">
                <span class="material-symbols-outlined">currency_rupee</span>
                <div class="v-spec-content">
                  <span class="lbl">Price</span>
                  <div style="display:flex;align-items:baseline;gap:0.3rem;">
                    <span class="v-spec-value" data-price-display>${variants[0].price}</span>
                    <span style="font-size:0.65rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;">/km</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="v-actions">
            <button class="btn-select" onclick="openBookingModal(event, '${vehicle.name}', '${variants[0].price}', '${variants[0].seats}', ${variants.length > 1})">Select Vehicle</button>
            <button class="btn-info">
              <span class="material-symbols-outlined">info</span>
            </button>
          </div>
        </div>
      </div>
    `;
          }).join('');
        }

        // Initial render
        renderVehicles('all');

        // Add filter button listeners
        filterBtns.forEach(btn => {
          btn.addEventListener('click', function () {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const filterType = this.dataset.type;
            renderVehicles(filterType);
          });
        });

      } catch (error) {
        console.error('Error loading vehicles:', error);
        document.getElementById('vehicleGrid').innerHTML = '<p>Error loading vehicles. Please try again later.</p>';
      }
    });

    // Handle variant selection
    function selectVariant(button, vehicleName, seats, price) {
      const container = button.parentElement;
      container.querySelectorAll('.variant-btn').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');

      // Update the spec box values
      const specBox = container.nextElementSibling;
      specBox.querySelector('[data-seats-display]').textContent = seats;
      specBox.querySelector('[data-price-display]').textContent = price;

      // Update button onclick with new values (passing true for hasVariants)
      const selectBtn = container.parentElement.querySelector('.btn-select');
      selectBtn.onclick = function (e) { openBookingModal(e, vehicleName, price, seats, true); };
    }
  </script>
</body>

</html>
